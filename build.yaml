targets:
  $default:
    builders:
      freezed:
        enabled: true
        options:
          # Generate copyWith, ==, hashCode, toString
          # Use union types and pattern matching
          union_key: 'type'
          union_value_case: 'pascal'
      json_serializable:
        enabled: true
        options:
          # Generate fromJson and toJson
          any_map: false
          checked: true
          create_to_json: true
          disallow_unrecognized_keys: false
          explicit_to_json: true
